<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viaje Espacial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Nunito+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" data-screen="files">
      <section class="screen file-screen" data-screen="files">
        <div class="file-stage">
          <p class="stage-kicker">HTML HUNGMSP</p>
          <h1 class="stage-title">LỢN CHÓ</h1>

            <button class="file-card file-card--active" data-open-file>
              <span class="file-card__arrow">↗</span>
              <span class="file-card__body">
                <span class="file-card__icon">HUNG</span>
                <span class="file-card__meta">
                  </strong>file capcup</strong>
                  <small>30 kB • HTML</small>
                </span>
                <span class="file-card__time">Open</span>
              </span>
            </button>
          </div>
        </div>
      </section>

      <section class="screen launch-screen" data-screen="launch">
        <button class="launch-orb" type="button" data-start>
          <span class="launch-orb__ring"></span>
          <span class="launch-orb__rocket">🚀</span>
        </button>
        <p class="launch-title">vào</p>
      </section>

      <section class="screen space-screen" data-screen="space">
        <canvas id="starfield" class="starfield"></canvas>
        <div id="orbitLayer" class="orbit-layer"></div>
        <button class="restart-button" type="button" data-restart>Xem lại</button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
