<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xin chào mọi người</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a5acd,#4b0082);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    color: white;
    width: 90%;
    max-width: 400px;
}

.avatar {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 6px solid white;
    object-fit: cover;
}

h1 {
    margin: 20px 0 10px;
}

p {
    opacity: 0.9;
}

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    background: #1e66f5;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
    <img src="https://i.imgur.com/Jy4tYqG.png" class="avatar">
    <h1>Xin chào mọi người</h1>
    <p>Hãy tham gia vào nhóm để được chơi với mình</p>
    <a href="https://zalo.me/g/dmgecy729" class="button">
        Tham gia nhóm Zalo
    </a>
</div>

</body>
</html>
